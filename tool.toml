# ─── Identity ─────────────────────────────────────────────────────────────────
# 'name' must match the folder name under backend/tools/ used by the platform
# discovery loader.
tool_id            = "document_catalog_query"
name               = "document_catalog_query"
version            = "0.1.0"
# TechVault auto-discovers this tool when the repo is present under
# backend/tools/document_catalog_query/ and contains a valid tool.toml.
# Activation is determined first by local TechVault operator overrides,
# and otherwise by this field. Set false for conservative default.
enabled_by_default = true

# ─── API ──────────────────────────────────────────────────────────────────────
[api]
router_import = "document_catalog_query.api.router:router"
mount_prefix  = "/tools/document-catalog-query"
tags          = ["tools:document_catalog_query"]

# ─── Agent Tool ───────────────────────────────────────────────────────────────
[agent_tool]
enabled = false
# Stub placeholders for future agent-mode integration.
tool_import = "document_catalog_query.tool:TOOL_SPEC"
run_import  = "document_catalog_query.tool:run"

# ─── Policy ───────────────────────────────────────────────────────────────────
[policy]
# Read-only metadata access is permitted at all security levels.
# Row-level group filtering is handled by the service filter layer.
allowed_security_levels    = ["public", "internal", "protected", "secret"]
allow_all_groups            = false
allowed_groups              = []
required_roles              = []
requires_network            = false
requires_filesystem_write   = false
requires_db                 = true

# ─── Capabilities ─────────────────────────────────────────────────────────────
[capabilities]
actions = ["health", "query"]

# ─── Runtime Adapters ────────────────────────────────────────────────────────
# document_catalog_query reads from TechVault's documents table at runtime.
# No tool-owned Alembic tables; no database.metadata_import needed.
[[techvault.adapters]]
dependency_import      = "document_catalog_query.api.deps:get_catalog_records"
override_factory_import = "backend.platform.tool_adapters.document_catalog_query:get_catalog_records_override"

# ─── Platform Metadata ──────────────────────────────────────────────────────

[platform]
contract_version = "1"

# ─── Template Stamp ───────────────────────────────────────────────────────────

[template]
stamp_source = "manual"
template_manifest_hash = "758ccc68d99449165c3b2829787a8e74c104851f41e6eee7bbdc09eeef62e703"
template_version = "2.0.0"
